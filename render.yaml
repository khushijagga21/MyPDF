# Free deploy on Render (https://render.com)
# Use Neon (free) for DATABASE_URL — Render free Postgres expires after 90 days.
services:
  - type: web
    name: mypdf
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: AUTH_URL
        sync: false
      - key: SITE_URL
        sync: false
